<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Meeting Partner - Ultimate Edition</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
    :root { --primary: #2c3e50; --accent: #8e44ad; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; --info: #2980b9; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--primary); padding: 15px; margin: 0; }
    .container { max-width: 750px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h2 { font-size: 1.5em; border-left: 6px solid var(--accent); padding-left: 12px; margin-top: 0; color: var(--primary); }
    
    .config-panel { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
    .config-group { margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    input[type="password"] { width: 60%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; }
    select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; background: white; cursor: pointer; }
    
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    button { flex: 1; min-width: 140px; padding: 15px; font-size: 1em; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; transition: all 0.2s ease; }
    #startBtn { background: var(--accent); }
    #stopBtn { background: var(--danger); display: none; }
    #downloadBtn { background: var(--success); }
    button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    button:disabled { background: #95a5a6; cursor: not-allowed; }
    
    .status-bar { font-size: 0.95em; margin-bottom: 20px; font-weight: bold; color: #555; display: flex; align-items: center; gap: 8px; padding: 10px; background: #fffbe6; border-radius: 6px; border: 1px solid #ffe58f; }
    .recording-indicator { width: 14px; height: 14px; background: var(--danger); border-radius: 50%; animation: blink 1.2s infinite; opacity: 0; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    
    #timer-display { margin-left: auto; color: var(--accent); font-family: 'Courier New', Courier, monospace; font-size: 1.1em; }

    #preview-container { text-align: center; margin-bottom: 20px; }
    #screenVideo { width: 100%; max-height: 220px; background: #000; border-radius: 8px; border: 3px solid #333; }
    
    .box-title { font-size: 1.1em; font-weight: bold; margin-bottom: 10px; color: var(--primary); display: flex; align-items: center; gap: 5px; }
    #transcript-area { height: 180px; overflow-y: auto; background: #1e272e; padding: 15px; border-radius: 8px; font-size: 0.9em; line-height: 1.7; color: #ecf0f1; border: 1px solid #34495e; white-space: pre-wrap; margin-bottom: 25px; }
    
    .insight-card { background: #fbf5ff; padding: 20px; border-left: 5px solid var(--accent); border-radius: 8px; font-size: 1em; line-height: 1.8; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; animation: slideIn 0.4s ease-out; }
    .insight-time { font-size: 0.85em; color: #8e44ad; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #e8daef; display: inline-block; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<div class="container">
    <h2>AI Meeting Partner</h2>
    
    <div class="config-panel">
        <div class="config-group">
            <label>API Key:</label>
            <input type="password" id="apiKey" placeholder="AIzaSy..." onchange="this.value = this.value.trim()">
        </div>
        <div class="config-group">
            <label>分析間隔:</label>
            <select id="intervalSelect" onchange="resetTimer()">
                <option value="10">10秒ごと</option>
                <option value="30">30秒ごと</option>
                <option value="60" selected>1分ごと</option>
                <option value="180">3分ごと</option>
                <option value="300">5分ごと</option>
                <option value="600">10分ごと</option>
            </select>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" onclick="startMeeting()" disabled>起動準備中...</button>
        <button id="stopBtn" onclick="stopMeeting()">会議終了</button>
        <button id="downloadBtn" onclick="downloadLog()">結果をダウンロード</button>
    </div>

    <div class="status-bar">
        <div class="recording-indicator" id="recIcon"></div>
        <span id="statusText">OCRエンジンの準備中...</span>
        <span id="timer-display"></span>
    </div>

    <div id="preview-container">
        <div class="box-title">🎥 プレビュー (Teams等のウィンドウを選択)</div>
        <video id="screenVideo" autoplay muted></video>
        <canvas id="captureCanvas" style="display:none;"></canvas>
    </div>

    <div class="box-title">📝 リアルタイム抽出テキスト</div>
    <div id="transcript-area">ここに抽出された字幕テキストが蓄積されます。</div>

    <div class="box-title">💡 戦略コンサルタントの論点分析</div>
    <div id="insights-area"></div>
</div>

<script>
    let worker = null;
    let screenStream;
    let isRecording = false;
    let fullTranscript = "";
    let lastOcrText = "";
    let ocrIntervalTimer;
    let countdownTimer;
    let timeRemaining = 0;
    let isProcessingOCR = false;

    // 初期化: OCRワーカーを常駐させる
    window.onload = async () => {
        const savedKey = localStorage.getItem('geminiApiKey');
        if (savedKey) document.getElementById('apiKey').value = savedKey;

        try {
            worker = await Tesseract.createWorker('jpn');
            document.getElementById('statusText').innerText = "待機中 (準備OK)";
            const btn = document.getElementById('startBtn');
            btn.innerText = "画面キャプチャ開始";
            btn.disabled = false;
        } catch (e) {
            document.getElementById('statusText').innerText = "エラー: OCRエンジンの読み込みに失敗しました。";
        }
    };

    function resetTimer() {
        if (isRecording) {
            timeRemaining = parseInt(document.getElementById('intervalSelect').value);
            updateTimerDisplay();
        }
    }

    function updateTimerDisplay() {
        const display = document.getElementById('timer-display');
        if (!isRecording) { display.innerText = ""; return; }
        const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
        const s = (timeRemaining % 60).toString().padStart(2, '0');
        display.innerText = `次の分析まで: ${m}:${s}`;
    }

    async function startMeeting() {
        const apiKey = document.getElementById('apiKey').value.trim();
        if (!apiKey) { alert("APIキーを入力してください。"); return; }
        localStorage.setItem('geminiApiKey', apiKey);

        try {
            screenStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: "always" }, audio: false });
            document.getElementById('screenVideo').srcObject = screenStream;

            fullTranscript = "";
            lastOcrText = "";
            document.getElementById('transcript-area').innerText = "";
            document.getElementById('insights-area').innerHTML = ""; 
            
            isRecording = true;
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('stopBtn').style.display = "block";
            document.getElementById('recIcon').style.opacity = "1";
            document.getElementById('statusText').innerText = "実行中...";

            // OCRの5秒おき実行
            ocrIntervalTimer = setInterval(captureAndOCR, 5000);
            
            // 分析カウントダウンタイマーの開始
            timeRemaining = parseInt(document.getElementById('intervalSelect').value);
            updateTimerDisplay();
            countdownTimer = setInterval(() => {
                timeRemaining--;
                if (timeRemaining <= 0) {
                    analyzeConversation();
                    timeRemaining = parseInt(document.getElementById('intervalSelect').value);
                }
                updateTimerDisplay();
            }, 1000);

            screenStream.getVideoTracks()[0].onended = () => stopMeeting();
        } catch (e) {
            alert("画面共有が許可されませんでした。");
        }
    }

    function stopMeeting() {
        isRecording = false;
        clearInterval(ocrIntervalTimer);
        clearInterval(countdownTimer);
        if (screenStream) screenStream.getTracks().forEach(t => t.stop());
        document.getElementById('startBtn').style.display = "block";
        document.getElementById('stopBtn').style.display = "none";
        document.getElementById('recIcon').style.opacity = "0";
        document.getElementById('statusText').innerText = "終了しました。";
        updateTimerDisplay();
    }

    async function captureAndOCR() {
        if (isProcessingOCR || !isRecording || !worker) return;
        isProcessingOCR = true;

        const video = document.getElementById('screenVideo');
        const canvas = document.getElementById('captureCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        try {
            const result = await worker.recognize(canvas);
            const currentText = result.data.text.replace(/\s+/g, '').trim();

            if (currentText.length > 5 && currentText !== lastOcrText) {
                // 前回と20文字以上被っていなければ追加
                const head = currentText.substring(0, 15);
                if (!lastOcrText.includes(head)) {
                    fullTranscript += currentText + "\n\n";
                    const area = document.getElementById('transcript-area');
                    area.innerText = fullTranscript;
                    area.scrollTop = area.scrollHeight;
                    lastOcrText = currentText;
                }
            }
        } catch (e) {
            console.error("OCR Error:", e);
        } finally {
            isProcessingOCR = false;
        }
    }

    async function analyzeConversation() {
        if (fullTranscript.length < 20) return;

        const apiKey = document.getElementById('apiKey').value.trim();
        document.getElementById('statusText').innerText = "Gemini分析中...";
        
        // 【修正版URL】v1安定版のURLを使用。モデル名の不一致を解消。
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        
        const promptData = {
            contents: [{
                parts: [{
                    text: `あなたはEYなどのトップティアに所属する戦略コンサルタントです。以下のデータは会議の字幕をOCRで読み取った生データです。議論を構造化して以下の形式で出力してください。\n\n1. 【現状の主要アジェンダ】\n   - 議論の核となる課題を2〜3点に整理\n2. 【コンサル視点の鋭い問い】\n   - North Star Metricから逆算し、意思決定を加速させるための質問を1つ提示\n\nデータ：\n${fullTranscript}`
                }]
            }]
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(promptData)
            });

            if (!response.ok) {
                const err = await response.json();
                console.error("API Error Detail:", err);
                throw new Error("API通信エラー");
            }

            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const card = document.createElement('div');
            card.className = 'insight-card';
            card.dataset.rawText = `[${time}]\n${text}`; 
            card.innerHTML = `<div class="insight-time">🕒 ${time} 分析実行</div><div>${text.replace(/\n/g, '<br>')}</div>`;
            
            const area = document.getElementById('insights-area');
            area.insertBefore(card, area.firstChild);
            document.getElementById('statusText').innerText = "実行中...";
        } catch (e) {
            document.getElementById('statusText').innerText = "APIエラー（通信失敗）";
        }
    }

    function downloadLog() {
        let content = "Meeting Log - " + new Date().toLocaleString() + "\n\n";
        content += "■ 戦略コンサルタントの分析 ■\n\n";
        const cards = document.querySelectorAll('.insight-card');
        cards.forEach(c => content += c.dataset.rawText + "\n\n---\n\n");
        content += "\n■ OCR生データ ■\n\n" + fullTranscript;

        const blob = new Blob([content], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Meeting_Log_${new Date().getTime()}.txt`;
        a.click();
    }
</script>
</body>
</html>
