<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Meeting Partner - Ultimate Stable Edition</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
    :root { --primary: #2c3e50; --accent: #8e44ad; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--primary); padding: 15px; margin: 0; }
    .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h2 { font-size: 1.5em; border-left: 6px solid var(--accent); padding-left: 12px; margin-top: 0; color: var(--primary); }
    
    .config-panel { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
    .config-group { margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    input[type="password"] { width: 65%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; }
    select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; background: white; cursor: pointer; }
    
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    button { flex: 1; min-width: 140px; padding: 15px; font-size: 1em; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; transition: all 0.2s ease; }
    #startBtn { background: var(--accent); }
    #stopBtn { background: var(--danger); display: none; }
    #downloadBtn { background: var(--success); }
    button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    button:disabled { background: #95a5a6; cursor: not-allowed; }
    
    .status-bar { font-size: 0.95em; margin-bottom: 20px; font-weight: bold; color: #555; display: flex; align-items: center; gap: 8px; padding: 10px; background: #fffbe6; border-radius: 6px; border: 1px solid #ffe58f; }
    .recording-indicator { width: 14px; height: 14px; background: var(--danger); border-radius: 50%; animation: blink 1.2s infinite; opacity: 0; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    #preview-container { text-align: center; margin-bottom: 20px; }
    #screenVideo { width: 100%; max-height: 200px; background: #000; border-radius: 8px; border: 3px solid #333; }
    
    .box-title { font-size: 1.1em; font-weight: bold; margin-bottom: 10px; color: var(--primary); display: flex; align-items: center; gap: 5px; }
    #transcript-area { height: 180px; overflow-y: auto; background: #1e272e; padding: 15px; border-radius: 8px; font-size: 0.9em; line-height: 1.7; color: #ecf0f1; border: 1px solid #34495e; white-space: pre-wrap; margin-bottom: 25px; }
    
    .insight-card { background: #fbf5ff; padding: 20px; border-left: 5px solid var(--accent); border-radius: 8px; font-size: 1em; line-height: 1.8; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; animation: slideIn 0.4s ease-out; }
    .insight-time { font-size: 0.85em; color: #8e44ad; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #e8daef; display: inline-block; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<div class="container">
    <h2>AI Meeting Partner</h2>
    
    <div class="config-panel">
        <div class="config-group">
            <label>API Key:</label>
            <input type="password" id="apiKey" placeholder="AIzaSy..." onchange="this.value = this.value.trim()">
        </div>
        <div class="config-group">
            <label>分析間隔:</label>
            <select id="intervalSelect">
                <option value="1" selected>1分ごと</option>
                <option value="3">3分ごと</option>
                <option value="5">5分ごと</option>
            </select>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" onclick="startMeeting()" disabled>起動準備中...</button>
        <button id="stopBtn" onclick="stopMeeting()">会議終了</button>
        <button id="downloadBtn" onclick="downloadLog()">結果をダウンロード</button>
    </div>

    <div class="status-bar">
        <div class="recording-indicator" id="recIcon"></div>
        <span id="statusText">OCRエンジンをダウンロード中...（初回のみ数秒かかります）</span>
    </div>

    <div id="preview-container">
        <div class="box-title">🎥 プレビュー (Teams等のウィンドウを選択)</div>
        <video id="screenVideo" autoplay muted></video>
        <canvas id="captureCanvas" style="display:none;"></canvas>
    </div>

    <div class="box-title">📝 リアルタイム抽出テキスト</div>
    <div id="transcript-area">ここに抽出された字幕テキストが蓄積されます。</div>

    <div class="box-title">💡 戦略コンサルタントの論点分析</div>
    <div id="insights-area"></div>
</div>

<script>
    let worker = null;
    let screenStream;
    let isRecording = false;
    let fullTranscript = "";
    let lastOcrText = "";
    let analysisIntervalTimer;
    let ocrIntervalTimer;
    let isProcessingOCR = false;

    // ページ読み込み時に「常駐型OCRワーカー」を1度だけ作成する（これがフリーズを防ぐカギ）
    window.onload = async () => {
        const savedKey = localStorage.getItem('geminiApiKey');
        if (savedKey) document.getElementById('apiKey').value = savedKey;

        try {
            worker = await Tesseract.createWorker('jpn');
            document.getElementById('statusText').innerText = "待機中 (準備OK・いつでも開始できます)";
            const startBtn = document.getElementById('startBtn');
            startBtn.innerText = "画面キャプチャ開始";
            startBtn.disabled = false;
        } catch (error) {
            console.error("OCRエンジンの起動失敗:", error);
            document.getElementById('statusText').innerText = "OCRの準備に失敗しました。ページをリロードしてください。";
        }
    };

    async function startMeeting() {
        const apiKey = document.getElementById('apiKey').value.trim();
        if (!apiKey) { alert("APIキーを入力してください。"); return; }
        
        document.getElementById('apiKey').value = apiKey;
        localStorage.setItem('geminiApiKey', apiKey);

        if (!worker) { alert("OCRエンジンの準備が完了していません。少しお待ちください。"); return; }

        try {
            screenStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: "always" }, audio: false });
            const video = document.getElementById('screenVideo');
            video.srcObject = screenStream;

            fullTranscript = "";
            lastOcrText = "";
            document.getElementById('transcript-area').innerText = "";
            document.getElementById('insights-area').innerHTML = ""; 
            
            isRecording = true;
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('stopBtn').style.display = "block";
            document.getElementById('recIcon').style.opacity = "1";
            document.getElementById('statusText').innerText = "OCR実行中...";

            // 5秒ごとに常駐ワーカーに画像を投げる
            ocrIntervalTimer = setInterval(captureAndOCR, 5000);
            const minutes = parseInt(document.getElementById('intervalSelect').value);
            analysisIntervalTimer = setInterval(analyzeConversation, minutes * 60 * 1000);

            screenStream.getVideoTracks()[0].onended = () => stopMeeting();

        } catch (error) {
            console.error("画面共有エラー:", error);
            alert("画面共有がキャンセルされました。");
        }
    }

    function stopMeeting() {
        isRecording = false;
        clearInterval(analysisIntervalTimer);
        clearInterval(ocrIntervalTimer);
        if (screenStream) screenStream.getTracks().forEach(t => t.stop());
        document.getElementById('startBtn').style.display = "block";
        document.getElementById('stopBtn').style.display = "none";
        document.getElementById('recIcon').style.opacity = "0";
        document.getElementById('statusText').innerText = "終了しました。";
    }

    async function captureAndOCR() {
        if (isProcessingOCR || !isRecording || !worker) return;
        isProcessingOCR = true;

        const video = document.getElementById('screenVideo');
        const canvas = document.getElementById('captureCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        try {
            // 常駐ワーカーを使うため一瞬で処理が終わります
            const result = await worker.recognize(canvas);
            const currentText = result.data.text.replace(/\s+/g, '').trim();

            if (currentText.length > 10) {
                // 簡易かつ確実な差分チェック
                if (lastOcrText !== currentText) {
                    // スクロールせず同じ画面を見ている場合は、先頭の20文字が前回に含まれているかで判定
                    const headToVerify = currentText.substring(0, 20);
                    if (lastOcrText.includes(headToVerify)) {
                        // ほぼ同じ画面とみなして無視（重複防止）
                    } else {
                        // 画面が切り替わった（スクロールした）と判定し、新テキストを追加
                        fullTranscript += currentText + "\n\n";
                        const area = document.getElementById('transcript-area');
                        area.innerText = fullTranscript;
                        area.scrollTop = area.scrollHeight; 
                        lastOcrText = currentText;
                    }
                }
            }
        } catch (e) {
            console.error("OCR Error:", e);
        } finally {
            isProcessingOCR = false;
        }
    }

    async function analyzeConversation() {
        if (fullTranscript.length < 20) return;

        const apiKey = document.getElementById('apiKey').value.trim();
        document.getElementById('statusText').innerText = "Gemini分析中...";
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;
        
        const promptData = {
            contents: [{
                parts: [{
                    text: `あなたはEYなどのトップティアに所属する戦略コンサルタントです。以下のデータは会議の字幕をOCRで読み取った生データです。重複やノイズを除去し、議論を構造化して以下の形式で出力してください。\n\n1. 【現状の主要アジェンダ】\n   - 議論の核となる課題を2〜3点に整理\n2. 【コンサル視点の鋭い問い】\n   - North Star Metricから逆算し、意思決定を加速させるための質問を1つ提示\n\nデータ：\n${fullTranscript}`
                }]
            }]
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(promptData)
            });

            if (!response.ok) {
                const errorBody = await response.text();
                console.error("▼ Google APIからのエラー詳細 ▼\n", errorBody);
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const card = document.createElement('div');
            card.className = 'insight-card';
            card.dataset.rawText = `[${time}]\n${text}`; 
            card.innerHTML = `<div class="insight-time">🕒 ${time} 分析実行</div><div>${text.replace(/\n/g, '<br>')}</div>`;
            
            const area = document.getElementById('insights-area');
            area.insertBefore(card, area.firstChild);
            document.getElementById('statusText').innerText = "OCR実行中...";

        } catch (e) {
            console.error("API Error:", e);
            document.getElementById('statusText').innerText = "APIエラー（通信失敗）";
        }
    }

    function downloadLog() {
        let content = "=========================================\n";
        content += " AI Meeting Partner - 会議ログ\n";
        content += " ダウンロード日時: " + new Date().toLocaleString() + "\n";
        content += "=========================================\n\n";

        content += "■ 戦略コンサルタントの論点分析 ■\n\n";
        const cards = document.getElementById('insights-area').getElementsByClassName('insight-card');
        
        if (cards.length === 0) {
            content += "分析結果はまだありません。\n\n";
        } else {
            for (let i = 0; i < cards.length; i++) {
                content += cards[i].dataset.rawText + "\n\n-----------------------------------------\n\n";
            }
        }

        content += "\n■ リアルタイム抽出テキスト（OCR生データ） ■\n\n";
        content += fullTranscript ? fullTranscript : "テキストデータなし";

        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const fileNameTime = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
        a.download = `Meeting_Log_${fileNameTime}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
