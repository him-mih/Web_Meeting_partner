<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Meeting Partner - Enterprise JSON Edition</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
    :root { --primary: #2c3e50; --accent: #8e44ad; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; --info: #2980b9; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--primary); padding: 15px; margin: 0; }
    .container { max-width: 750px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h2 { font-size: 1.5em; border-left: 6px solid var(--accent); padding-left: 12px; margin-top: 0; color: var(--primary); }
    
    .config-panel { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
    .config-group { margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    input[type="password"] { width: 60%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; }
    select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; background: white; cursor: pointer; }
    
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    button { flex: 1; min-width: 140px; padding: 15px; font-size: 1em; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; transition: all 0.2s ease; }
    #startBtn { background: var(--accent); }
    #stopBtn { background: var(--danger); display: none; }
    #downloadBtn { background: var(--success); }
    button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    button:disabled { background: #95a5a6; cursor: not-allowed; }
    
    .status-bar { font-size: 0.95em; margin-bottom: 20px; font-weight: bold; color: #555; display: flex; align-items: center; gap: 8px; padding: 10px; background: #fffbe6; border-radius: 6px; border: 1px solid #ffe58f; }
    .recording-indicator { width: 14px; height: 14px; background: var(--danger); border-radius: 50%; animation: blink 1.2s infinite; opacity: 0; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    
    #timer-display { margin-left: auto; color: var(--accent); font-family: 'Courier New', Courier, monospace; font-size: 1.1em; }

    #preview-container { text-align: center; margin-bottom: 20px; position: relative; }
    #screenVideo { width: 100%; max-height: 220px; background: #000; border-radius: 8px; border: 3px solid #333; }
    .crop-guide { position: absolute; bottom: 3px; left: 3px; right: 3px; height: 30%; border: 2px dashed rgba(46, 204, 113, 0.7); pointer-events: none; border-radius: 0 0 5px 5px; box-sizing: border-box; }
    
    .box-title { font-size: 1.1em; font-weight: bold; margin-bottom: 10px; color: var(--primary); display: flex; align-items: center; gap: 5px; }
    #transcript-area { height: 180px; overflow-y: auto; background: #1e272e; padding: 15px; border-radius: 8px; font-size: 0.9em; line-height: 1.7; color: #ecf0f1; border: 1px solid #34495e; white-space: pre-wrap; margin-bottom: 25px; }
    
    .insight-card { background: #fbf5ff; padding: 20px; border-left: 5px solid var(--accent); border-radius: 8px; font-size: 1em; line-height: 1.8; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; animation: slideIn 0.4s ease-out; }
    .insight-time { font-size: 0.85em; color: #8e44ad; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #e8daef; display: inline-block; }
    
    .json-section-title { font-weight: bold; color: var(--primary); margin-top: 10px; margin-bottom: 5px; }
    .json-summary { margin-bottom: 15px; padding-left: 10px; border-left: 3px solid var(--info); }
    .json-questions { margin: 0; padding-left: 20px; }
    .json-questions li { margin-bottom: 5px; }
    
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<div class="container">
    <h2>AI Meeting Partner</h2>
    
    <div class="config-panel">
        <div class="config-group">
            <label>API Key:</label>
            <input type="password" id="apiKey" placeholder="AIzaSy..." onchange="this.value = this.value.trim()">
        </div>
        <div class="config-group">
            <label>分析間隔:</label>
            <select id="intervalSelect" onchange="resetTimer()">
                <option value="10">10秒ごと (テスト用)</option>
                <option value="30">30秒ごと</option>
                <option value="60" selected>1分ごと</option>
                <option value="180">3分ごと</option>
                <option value="300">5分ごと</option>
            </select>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" onclick="startMeeting()" disabled>起動準備中...</button>
        <button id="stopBtn" onclick="stopMeeting()">会議終了</button>
        <button id="downloadBtn" onclick="downloadLog()">結果をダウンロード</button>
    </div>

    <div class="status-bar">
        <div class="recording-indicator" id="recIcon"></div>
        <span id="statusText">OCRエンジンの準備中...</span>
        <span id="timer-display"></span>
    </div>

    <div id="preview-container">
        <div class="box-title">🎥 プレビュー (緑の枠内が文字読み取り範囲です)</div>
        <video id="screenVideo" autoplay muted></video>
        <div class="crop-guide"></div>
        <canvas id="captureCanvas" style="display:none;"></canvas>
    </div>

    <div class="box-title">📝 リアルタイム抽出テキスト (新規差分のみ)</div>
    <div id="transcript-area">ここに抽出された字幕テキストが蓄積されます。</div>

    <div class="box-title">💡 戦略コンサルタントの論点分析</div>
    <div id="insights-area"></div>
</div>

<script>
    // --- 1. グローバル変数 ---
    const GEMINI_MODEL = "gemini-2.5-flash"; // Googleの最新・高速標準モデル
    
    let worker = null;
    let screenStream = null;
    let isRecording = false;
    
    let fullTranscript = "";     
    let pendingTranscript = "";  
    let analyzedTranscript = ""; 
    
    let lastStableText = "";
    let recentOcrTexts = [];
    
    let ocrIntervalTimer;
    let countdownTimer;
    let timeRemaining = 0;
    let isProcessingOCR = false;

    // --- 2. 初期化 ---
    window.onload = async () => {
        const savedKey = localStorage.getItem('geminiApiKey');
        if (savedKey) document.getElementById('apiKey').value = savedKey;

        try {
            worker = await Tesseract.createWorker('jpn');
            document.getElementById('statusText').innerText = "待機中 (準備OK)";
            const btn = document.getElementById('startBtn');
            btn.innerText = "画面キャプチャ開始";
            btn.disabled = false;
        } catch (e) {
            document.getElementById('statusText').innerText = "エラー: OCRエンジンの読み込みに失敗しました。";
        }
    };

    // --- 3. タイマー管理 ---
    function resetTimer() {
        if (isRecording) {
            timeRemaining = parseInt(document.getElementById('intervalSelect').value);
            updateTimerDisplay();
        }
    }

    function updateTimerDisplay() {
        const display = document.getElementById('timer-display');
        if (!isRecording) { display.innerText = ""; return; }
        const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
        const s = (timeRemaining % 60).toString().padStart(2, '0');
        display.innerText = `次の分析まで: ${m}:${s}`;
    }

    // --- 4. 会議の開始と終了 ---
    async function startMeeting() {
        const apiKey = document.getElementById('apiKey').value.trim();
        if (!apiKey) { alert("APIキーを入力してください。"); return; }
        localStorage.setItem('geminiApiKey', apiKey);

        try {
            screenStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: "always" }, audio: false });
            document.getElementById('screenVideo').srcObject = screenStream;

            fullTranscript = "";
            pendingTranscript = "";
            analyzedTranscript = "";
            lastStableText = "";
            recentOcrTexts = [];
            
            document.getElementById('transcript-area').innerText = "";
            document.getElementById('insights-area').innerHTML = ""; 
            
            isRecording = true;
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('stopBtn').style.display = "block";
            document.getElementById('recIcon').style.opacity = "1";
            document.getElementById('statusText').innerText = "実行中...";

            ocrIntervalTimer = setInterval(captureAndOCR, 3000); 
            
            timeRemaining = parseInt(document.getElementById('intervalSelect').value);
            updateTimerDisplay();
            countdownTimer = setInterval(() => {
                timeRemaining--;
                if (timeRemaining <= 0) {
                    analyzeConversation();
                    timeRemaining = parseInt(document.getElementById('intervalSelect').value);
                }
                updateTimerDisplay();
            }, 1000);

            screenStream.getVideoTracks()[0].onended = () => stopMeeting();
        } catch (e) {
            alert("画面共有が許可されませんでした。");
        }
    }

    function stopMeeting() {
        isRecording = false;
        clearInterval(ocrIntervalTimer);
        clearInterval(countdownTimer);
        if (screenStream) screenStream.getTracks().forEach(t => t.stop());
        document.getElementById('startBtn').style.display = "block";
        document.getElementById('stopBtn').style.display = "none";
        document.getElementById('recIcon').style.opacity = "0";
        document.getElementById('statusText').innerText = "終了しました。";
        updateTimerDisplay();
    }

    // --- 5. OCR改善ロジック（クロップ・正規化・重複排除） ---
    function drawSubtitleArea(video, canvas, ctx) {
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        if (!vw || !vh || vw < 100 || vh < 100) return false;

        const cropHeight = Math.floor(vh * 0.30);
        const sourceY = Math.floor(vh * 0.70);
        const scale = 2; // OCR精度向上のため字幕部分を拡大

        canvas.width = vw * scale;
        canvas.height = cropHeight * scale;
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
        ctx.drawImage(video, 0, sourceY, vw, cropHeight, 0, 0, vw, cropHeight);
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        return true;
    }

    function normalizeTextForCompare(text) {
        return text.replace(/\s+/g, "").replace(/[、。,.，．]/g, "").replace(/[「」『』【】\[\]()（）]/g, "").trim();
    }

    function cleanTextForDisplay(text) {
        return text.replace(/\s+/g, " ").replace(/ +/g, " ").trim();
    }

    function similarity(a, b) {
        if (!a || !b) return 0;
        const longer = a.length > b.length ? a : b;
        const shorter = a.length > b.length ? b : a;
        if (longer.includes(shorter)) return shorter.length / longer.length;

        let same = 0;
        const minLen = Math.min(a.length, b.length);
        for (let i = 0; i < minLen; i++) {
            if (a[i] === b[i]) same++;
        }
        return same / longer.length;
    }

    function isDuplicateText(newText) {
        const normalizedNew = normalizeTextForCompare(newText);
        return recentOcrTexts.some(oldText => {
            const normalizedOld = normalizeTextForCompare(oldText);
            return similarity(normalizedNew, normalizedOld) > 0.75;
        });
    }

    function rememberOcrText(text) {
        recentOcrTexts.push(text);
        if (recentOcrTexts.length > 10) recentOcrTexts.shift();
    }

    function extractNewPart(previous, current) {
        const prev = normalizeTextForCompare(previous);
        const curr = normalizeTextForCompare(current);
        if (!prev) return current;

        let maxOverlap = 0;
        const maxCheck = Math.min(prev.length, curr.length);

        for (let len = 1; len <= maxCheck; len++) {
            const prevTail = prev.slice(-len);
            const currHead = curr.slice(0, len);
            if (prevTail === currHead) {
                maxOverlap = len;
            }
        }

        if (maxOverlap > 5) return current.slice(maxOverlap).trim();
        if (similarity(prev, curr) > 0.75) return ""; 
        
        return current;
    }

    async function captureAndOCR() {
        if (isProcessingOCR || !isRecording || !worker) return;
        isProcessingOCR = true;

        const video = document.getElementById('screenVideo');
        const canvas = document.getElementById('captureCanvas');
        const ctx = canvas.getContext('2d');

        if (!video.srcObject || video.readyState < 2) {
            isProcessingOCR = false;
            return;
        }
        const hasDrawableFrame = drawSubtitleArea(video, canvas, ctx);
        if (!hasDrawableFrame) {
            isProcessingOCR = false;
            return;
        }

        try {
            const result = await worker.recognize(canvas);
            const rawText = result.data.text || "";
            const displayText = cleanTextForDisplay(rawText);
            const compareText = normalizeTextForCompare(displayText);

            if (compareText.length < 8) return;

            if (isDuplicateText(displayText)) return;

            const newPart = extractNewPart(lastStableText, displayText);

            if (normalizeTextForCompare(newPart).length >= 5) {
                fullTranscript += newPart + "\n";
                pendingTranscript += newPart + "\n"; 

                const area = document.getElementById('transcript-area');
                area.innerText = fullTranscript;
                area.scrollTop = area.scrollHeight;

                lastStableText = displayText;
                rememberOcrText(displayText);
            }
        } catch (e) {
            console.error("OCR Error:", e);
        } finally {
            isProcessingOCR = false;
        }
    }

    // --- 6. Gemini API 呼び出し（JSON強制モード） ---
    // GeminiからJSONを安定して受け取るためのスキーマ
    const ANALYSIS_SCHEMA = {
        type: "OBJECT",
        properties: {
            summary: {
                type: "STRING",
                description: "議論の核となる課題や要点。2〜3文程度。"
            },
            questions: {
                type: "ARRAY",
                description: "意思決定を加速させる想定質問。必ず3件。",
                minItems: 3,
                maxItems: 3,
                items: { type: "STRING" }
            }
        },
        required: ["summary", "questions"],
        propertyOrdering: ["summary", "questions"]
    };

    function parseGeminiJson(jsonText) {
        const raw = (jsonText || "").trim();
        let text = raw
            .replace(/^```json\s*/i, "")
            .replace(/^```\s*/i, "")
            .replace(/```$/i, "")
            .trim();

        try {
            return JSON.parse(text);
        } catch (firstError) {
            const start = text.indexOf("{");
            const end = text.lastIndexOf("}");
            if (start >= 0 && end > start) {
                try {
                    return JSON.parse(text.slice(start, end + 1));
                } catch (secondError) {
                    console.error("JSON Repair Parse Error:", secondError, text);
                }
            }
            console.error("Raw Gemini text:", raw);
            throw new Error("GeminiのJSON解析に失敗しました。response_schemaを使っても崩れる場合は、モデル名・APIキー権限・出力トークン上限を確認してください。");
        }
    }

    function normalizeAnalysisData(data) {
        const summary = typeof data?.summary === "string" ? data.summary.trim() : "";
        let questions = Array.isArray(data?.questions) ? data.questions : [];
        questions = questions.map(q => String(q).trim()).filter(Boolean).slice(0, 3);
        while (questions.length < 3) questions.push("追加で確認すべき論点は何か？");
        if (!summary) throw new Error("Gemini応答にsummaryがありません。");
        return { summary, questions };
    }

    function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, ch => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
        }[ch]));
    }

    async function callGemini(apiKey, promptText) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;

        const payload = {
            system_instruction: {
                parts: [{
                    text: "あなたはトップティアの戦略コンサルタントです。提供された字幕データだけを根拠に、現状の要約と、意思決定を加速させる3つの想定質問を生成してください。"
                }]
            },
            contents: [{
                role: "user",
                parts: [{ text: promptText }]
            }],
            generationConfig: {
                temperature: 0.2,
                max_output_tokens: 800,
                response_mime_type: "application/json",
                response_schema: ANALYSIS_SCHEMA
            }
        };

        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "x-goog-api-key": apiKey
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
            console.error("Gemini API raw error:", data);
            throw new Error(data.error?.message || JSON.stringify(data));
        }

        const text = data.candidates?.[0]?.content?.parts?.map(p => p.text || "").join("") || "";
        if (!text.trim()) {
            console.error("Gemini API empty response:", data);
            throw new Error("Geminiから空の応答が返りました。safetyRatingsやfinishReasonをConsoleで確認してください。");
        }
        return text;
    }

    async function analyzeConversation() {
        if (pendingTranscript.length < 15) return; 

        const apiKey = document.getElementById('apiKey').value.trim();
        document.getElementById('statusText').innerText = "Gemini分析中...";

        // JSONの形はgenerationConfig.response_schemaで固定するため、プロンプト側にはスキーマを書かない
        const promptText = `
以下の字幕データを分析してください。

観点:
- 議論の核となる課題や要点を2〜3文で要約する
- North Star Metric、具体アクション、リスク・懸念の3観点から想定質問を3つ作る
- OCRの誤字が混じる前提で、意味が通る範囲だけを使う

【前回までの要約】
${analyzedTranscript ? analyzedTranscript : "なし"}

【新しく取得された字幕データ】
${pendingTranscript}
`;

        try {
            const jsonText = await callGemini(apiKey, promptText);
            
            const parsedData = normalizeAnalysisData(parseGeminiJson(jsonText));
            const safeSummary = escapeHtml(parsedData.summary);
            const safeQuestions = parsedData.questions.map(q => escapeHtml(q));

            // JSONデータから綺麗なHTMLを組み立てる
            let htmlContent = `<div class="json-section-title">1. 【要約（現状の主要アジェンダ）】</div>`;
            htmlContent += `<div class="json-summary">${safeSummary}</div>`;
            
            htmlContent += `<div class="json-section-title">2. 【コンサル視点の想定質問】</div>`;
            htmlContent += `<ul class="json-questions">`;
            safeQuestions.forEach(q => {
                htmlContent += `<li>${q}</li>`;
            });
            htmlContent += `</ul>`;

            // 履歴更新・ダウンロード用にプレーンテキスト化
            const plainQuestions = parsedData.questions.map(q => `- ${q}`).join('\n');
            const plainText = `【要約】\n${parsedData.summary}\n\n【想定質問】\n${plainQuestions}`;
            
            analyzedTranscript += `\n\n[追加分]\n${plainText}`;
            pendingTranscript = ""; 
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const card = document.createElement('div');
            card.className = 'insight-card';
            card.dataset.rawText = `[${time}]\n${plainText}`; 
            card.innerHTML = `<div class="insight-time">🕒 ${time} 分析実行</div><div>${htmlContent}</div>`;
            
            const area = document.getElementById('insights-area');
            area.insertBefore(card, area.firstChild);
            document.getElementById('statusText').innerText = "実行中...";

        } catch (e) {
            console.error("API Error:", e);
            document.getElementById('statusText').innerText = "API通信失敗（詳細は画面下部）";
            
            const errCard = document.createElement('div');
            errCard.style.backgroundColor = "#ffebee";
            errCard.style.color = "#c62828";
            errCard.style.padding = "15px";
            errCard.style.borderRadius = "8px";
            errCard.style.marginBottom = "20px";
            errCard.innerHTML = `<b>⚠️ APIエラー:</b><br>${e.message}`;
            const area = document.getElementById('insights-area');
            area.insertBefore(errCard, area.firstChild);
        }
    }

    // --- 7. ダウンロード ---
    function downloadLog() {
        let content = "Meeting Log - " + new Date().toLocaleString() + "\n\n";
        content += "■ 戦略コンサルタントの分析 ■\n\n";
        const cards = document.querySelectorAll('.insight-card');
        cards.forEach(c => {
            if (c.dataset.rawText) content += c.dataset.rawText + "\n\n-----------------------------------------\n\n";
        });
        content += "\n■ OCR生データ（全履歴） ■\n\n" + fullTranscript;

        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        const fileNameTime = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
        a.download = `Meeting_Log_${fileNameTime}.txt`;
        a.click();
    }
</script>
</body>
</html>
